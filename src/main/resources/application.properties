spring.main.banner-mode=off

# --- Identity & server ---
spring.application.name=facto
server.port=8080

# --- Data source : PostgreSQL ---
# Defaults pour execution locale (PG service Windows sur la meme machine).
# Surcharger en prod ou sur une autre machine via :
#   - variables d'env Spring (SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD)
#   - ou un application.properties externe charge via -Dspring.config.additional-location=file:<path>/
spring.datasource.url=jdbc:postgresql://localhost:5432/facto
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# --- Thymeleaf hot reload ---
spring.thymeleaf.cache=false
spring.web.resources.cache.period=0

# --- Logging ---
logging.level.root=INFO
logging.level.com.guidelam.facto=DEBUG
logging.file.name=${facto.home:${user.home}/.facto}/logs/facto.log
logging.logback.rollingpolicy.max-history=7
logging.logback.rollingpolicy.max-file-size=10MB
