spring.main.banner-mode=off

# --- Identity & server ---
spring.application.name=facto
server.port=8080

# --- Data source : H2 in file mode (DB persisted under ~/.facto/db/) ---
spring.datasource.url=jdbc:h2:file:${user.home}/.facto/db/facto;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# --- H2 console (handy in dev) ---
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- Thymeleaf hot reload ---
spring.thymeleaf.cache=false
spring.web.resources.cache.period=0

# --- Logging ---
logging.level.root=INFO
logging.level.com.guidelam.facto=DEBUG
