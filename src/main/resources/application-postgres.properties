# Profil PostgreSQL.
# Activer avec : SPRING_PROFILES_ACTIVE=postgres
#
# Valeurs par defaut "dev" : surcharger en prod via
#   - variables d'env Spring (SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD)
#   - ou un application.properties externe charge via -Dspring.config.additional-location=file:<path>/
spring.datasource.url=jdbc:postgresql://localhost:5432/facto
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=facto
spring.datasource.password=

# Pas de console H2 sous ce profil.
spring.h2.console.enabled=false
